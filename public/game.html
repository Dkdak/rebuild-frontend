<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>칙칙폭폭! 한글 단어 기차 놀이 (50단계)</title>
    <style>
        body {
            font-family: 'Malgun Gothic', sans-serif;
            background-color: #e3f2fd;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
            overflow: hidden;
            user-select: none;
        }
        .game-container {
            background-color: white;
            padding: 25px;
            border-radius: 25px;
            box-shadow: 0 12px 24px rgba(0,0,0,0.15);
            width: 90%;
            max-width: 420px;
            position: relative; /* 다시듣기 버튼 배치를 위해 추가 */
        }
        .stage-indicator {
            font-size: 18px;
            font-weight: bold;
            color: #1565c0;
            background-color: #e3f2fd;
            padding: 5px 15px;
            border-radius: 20px;
            display: inline-block;
            margin-bottom: 10px;
            float: left; /* 버튼과 정렬을 위해 좌측 정렬 */
            margin-left: 5px;
        }
        /* 다시듣기 버튼 스타일 */
        .audio-btn {
            position: absolute;
            top: 25px;
            right: 25px;
            background-color: #ffb74d;
            border: none;
            border-radius: 12px;
            padding: 6px 12px;
            font-size: 14px;
            font-weight: bold;
            color: white;
            cursor: pointer;
            box-shadow: 0 3px 0 #f57c00;
            display: block;
        }
        .audio-btn:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 #f57c00;
        }
        /* 상단 정렬을 위한 클리어 플로트 */
        .top-bar::after {
            content: "";
            display: table;
            clear: both;
        }
        .object-emoji {
            font-size: 80px;
            margin: 15px 0;
            margin-top: 25px;
            animation: bounce 2s infinite;
        }
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        .train-track {
            background: repeating-linear-gradient(90deg, #795548, #795548 10px, #bb8f8f 10px, #bb8f8f 20px);
            height: 8px;
            width: 100%;
            margin-top: 50px;
            margin-bottom: 30px;
            position: relative;
            border-radius: 4px;
        }
        .train-container {
            display: flex;
            justify-content: center;
            gap: 15px;
            position: absolute;
            width: 100%;
            top: -45px;
            left: 0;
        }
        .train-car {
            width: 65px;
            height: 55px;
            background-color: #ff7043;
            border: 3px solid #d84315;
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 24px;
            font-weight: bold;
            color: white;
            position: relative;
            box-shadow: inset 0 -5px 0 rgba(0,0,0,0.2);
            cursor: pointer;
            transition: all 0.2s;
        }
        .train-car::before, .train-car::after {
            content: '';
            position: absolute;
            bottom: -10px;
            width: 14px;
            height: 14px;
            background-color: #37474f;
            border-radius: 50%;
            border: 2px solid #fff;
        }
        .train-car::before { left: 8px; }
        .train-car::after { right: 8px; }
        
        .train-car.empty {
            background-color: #eceff1;
            border: 3px dashed #b0bec5;
            color: #b0bec5;
        }
        .pool-container {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-top: 20px;
            min-height: 70px;
            align-items: center;
        }
        .letter-card {
            width: 60px;
            height: 60px;
            background-color: #fffbcf;
            border: 3px solid #fbc02d;
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 26px;
            font-weight: bold;
            color: #c49000;
            cursor: pointer;
            box-shadow: 0 5px 0 #fbc02d;
            transition: all 0.1s;
        }
        .letter-card:active {
            transform: translateY(4px);
            box-shadow: 0 1px 0 #fbc02d;
        }
        .letter-card.used {
            visibility: hidden;
            opacity: 0;
        }
        .feedback-text {
            font-size: 18px;
            font-weight: bold;
            height: 25px;
            margin: 15px 0;
            color: #424242;
        }
        .next-btn {
            background-color: #4caf50;
            color: white;
            border: none;
            border-radius: 15px;
            padding: 12px 30px;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 5px 0 #2e7d32;
            display: none;
            margin: 0 auto;
        }
        .next-btn:active {
            transform: translateY(4px);
            box-shadow: 0 1px 0 #2e7d32;
        }
        .reset-btn {
            background-color: #2196f3;
            box-shadow: 0 5px 0 #0b7dda;
        }
        .reset-btn:active {
            transform: translateY(4px);
            box-shadow: 0 1px 0 #0b7dda;
        }
    </style>
</head>
<body>

<div class="game-container">
    <div class="top-bar">
        <div class="stage-indicator" id="stageId">[1/50] 단어 기차</div>
        <button class="audio-btn" id="audioBtn" onclick="speakWord(targetWord)">🔊 다시듣기</button>
    </div>
    
    <div class="object-emoji" id="objectEmoji">🍎</div>
    
    <div class="train-track">
        <div class="train-container" id="trainContainer"></div>
    </div>
    
    <div class="feedback-text" id="feedbackText">글자 카드를 눌러 기차에 태워주세요! 🚂</div>
    
    <div class="pool-container" id="poolContainer"></div>
    
    <button class="next-btn" id="nextBtn" onclick="nextStage()">다음 기차 출발! ▶</button>
    <button class="next-btn reset-btn" id="resetBtn" onclick="resetGame()">처음부터 다시하기 🔄</button>
</div>

<script>
    const dataset = [
        { w: "사과", e: "🍎" }, { w: "기차", e: "🚂" }, { w: "나비", e: "🦋" },
        { w: "버스", e: "🚌" }, { w: "사자", e: "🦁" }, { w: "오리", e: "🦆" },
        { w: "바나나", e: "🍌" }, { w: "수박", e: "🍉" }, { w: "포도", e: "🍇" },
        { w: "당근", e: "🥕" }, { w: "토끼", e: "🐰" }, { w: "우유", e: "🥛" },
        { w: "모자", e: "🎩" }, { w: "치즈", e: "🧀" }, { w: "딸기", e: "🍓" },
        { w: "자동차", e: "🚗" }, { w: "비행기", e: "✈️" }, { w: "자전거", e: "🚲" },
        { w: "소방차", e: "🚒" }, { w: "경찰차", e: "🚓" }, { w: "원숭이", e: "🐵" },
        { w: "강아지", e: "🐶" }, { w: "고양이", e: "🐱" }, { w: "호랑이", e: "🐯" },
        { w: "코끼리", e: "🐘" }, { w: "기린", e: "🦒" }, { w: "토마토", e: "🍅" },
        { w: "식빵", e: "🍞" }, { w: "우산", e: "☂️" }, { w: "선물", e: "🎁" },
        { w: "풍선", e: "🎈" }, { w: "구름", e: "☁️" }, { w: "바다", e: "🌊" },
        { w: "나무", e: "🌳" }, { w: "가위", e: "✂️" }, { w: "연필", e: "✏️" },
        { w: "가방", e: "🎒" }, { w: "로봇", e: "🤖" }, { w: "인형", e: "🧸" },
        { w: "치마", e: "👗" }, { w: "바지", e: "🩳" }, { w: "양말", e: "🧦" },
        { w: "신발", e: "👟" }, { w: "모기", e: "🦟" }, { w: "벌", e: "🐝" },
        { w: "달팽이", e: "🐌" }, { w: "고래", e: "🐳" }, { w: "문어", e: "🐙" },
        { w: "꽃게", e: "🦀" }, { w: "거북이", e: "🐢" }
    ];

    let currentStage = 0;
    let targetWord = "";
    let placedLetters = [];
    let shuffledLetters = [];

    // 한글 단어 소리 내어 읽어주기 기능 (Web Speech API)
    function speakWord(text) {
        if ('speechSynthesis' in window) {
            // 이전에 읽고 있던 음성이 있다면 겹치지 않게 취소 처리
            window.speechSynthesis.cancel();
            
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'ko-KR';
            utterance.rate = 0.9; // 6세 아이가 귀담아듣기 좋은 정갈하고 살짝 느린 속도
            utterance.pitch = 1.1; // 아이들이 친근감을 느끼도록 약간 밝고 높은 톤
            window.speechSynthesis.speak(utterance);
        }
    }

    function playBeep(type) {
        try {
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            if (type === 'success') {
                oscillator.frequency.setValueAtTime(587.33, audioCtx.currentTime);
                oscillator.frequency.setValueAtTime(880.00, audioCtx.currentTime + 0.1);
                gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
                oscillator.start(); oscillator.stop(audioCtx.currentTime + 0.25);
            } else if (type === 'fail') {
                oscillator.frequency.setValueAtTime(220.00, audioCtx.currentTime);
                gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
                oscillator.start(); oscillator.stop(audioCtx.currentTime + 0.2);
            }
        } catch(e) { console.log("Audio Error"); }
    }

    function initGame() {
        const nextBtn = document.getElementById('nextBtn');
        const resetBtn = document.getElementById('resetBtn');
        const audioBtn = document.getElementById('audioBtn');

        if (currentStage >= dataset.length) {
            document.getElementById('stageId').innerText = "🏆 완주 성공!";
            document.getElementById('objectEmoji').innerText = "👑";
            document.getElementById('feedbackText').innerText = "와~! 50단계 모든 단어 기차를 정복했어요!";
            document.getElementById('feedbackText').style.color = "#2e7d32";
            document.getElementById('trainContainer').innerHTML = "";
            document.getElementById('poolContainer').innerHTML = "";
            nextBtn.style.display = "none";
            audioBtn.style.display = "none"; // 게임 종료 시 다시듣기 버튼 숨김
            resetBtn.style.display = "block";
            
            speakWord("와, 축하합니다! 모든 단어 기차를 완료했어요!");
            return;
        }

        resetBtn.style.display = "none";
        audioBtn.style.display = "block"; // 스테이지 시작 시 다시듣기 버튼 표시

        const data = dataset[currentStage];
        targetWord = data.w;
        placedLetters = Array(targetWord.length).fill(""); 
        
        document.getElementById('stageId').innerText = `[${currentStage + 1}/50단계]`;
        document.getElementById('objectEmoji').innerText = data.e;
        document.getElementById('feedbackText').innerText = "글자 카드를 눌러 기차에 태워주세요! 🚂";
        document.getElementById('feedbackText').style.color = "#424242";
        nextBtn.style.display = "none";

        shuffledLetters = targetWord.split('').map((char, index) => ({ char, id: index, used: false }));
        
        if(targetWord.length === 2) {
            const extras = ["가", "나", "다", "로", "민", "지", "수", "하"];
            const randomExtra = extras[Math.floor(Math.random() * extras.length)];
            shuffledLetters.push({ char: randomExtra, id: 99, used: false });
        }
        shuffledLetters.sort(() => Math.random() - 0.5);

        renderTrain();
        renderPool();

        // 단계 시작 시 자동으로 단어 읽어주기
        // 모바일 브라우저의 첫 실행 터치 제약을 우회하기 위해 안전하게 발성 트레이스 추가
        setTimeout(() => {
            speakWord(targetWord);
        }, 100);
    }

    function renderTrain() {
        const container = document.getElementById('trainContainer');
        container.innerHTML = "";

        for (let i = 0; i < targetWord.length; i++) {
            const car = document.createElement('div');
            if (placedLetters[i] === "") {
                car.className = "train-car empty";
                car.innerText = "?";
            } else {
                car.className = "train-car";
                car.innerText = placedLetters[i].char;
                car.onclick = () => removeLetter(i);
            }
            container.appendChild(car);
        }
    }

    function renderPool() {
        const container = document.getElementById('poolContainer');
        container.innerHTML = "";

        shuffledLetters.forEach((item) => {
            const card = document.createElement('div');
            card.className = "letter-card";
            card.innerText = item.char;
            if (item.used) {
                card.className = "letter-card used";
            } else {
                card.onclick = () => selectLetter(item);
            }
            container.appendChild(card);
        });
    }

    function selectLetter(item) {
        const emptyIndex = placedLetters.indexOf("");
        if (emptyIndex !== -1) {
            item.used = true;
            placedLetters[emptyIndex] = item;
            renderTrain();
            renderPool();
            checkAnswer();
        }
    }

    function removeLetter(index) {
        const item = placedLetters[index];
        if (item) {
            item.used = false;
            placedLetters[index] = "";
            renderTrain();
            renderPool();
            document.getElementById('feedbackText').innerText = "글자 카드를 선택해 주세요!";
            document.getElementById('feedbackText').style.color = "#424242";
        }
    }

    function checkAnswer() {
        if (placedLetters.indexOf("") === -1) {
            const currentWord = placedLetters.map(item => item.char).join("");
            
            if (currentWord === targetWord) {
                document.getElementById('feedbackText').innerText = "🎉 정답입니다! 칙칙폭폭 기차가 출발해요! 💨";
                document.getElementById('feedbackText').style.color = "#2e7d32";
                document.getElementById('nextBtn').style.display = "block";
                playBeep('success');
                // 정답을 맞추면 확인용으로 한 번 더 단어를 읽어줌
                speakWord(targetWord);
            } else {
                document.getElementById('feedbackText').innerText = "❌ 어라? 글자 순서가 다른 것 같아요. 다시 해봐요!";
                document.getElementById('feedbackText').style.color = "#d32f2f";
                playBeep('fail');
            }
        }
    }

    function nextStage() {
        currentStage++;
        initGame();
    }

    function resetGame() {
        currentStage = 0;
        initGame();
    }

    initGame();
</script>

</body>
</html>
